version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: nx_postgres
    ports:
      - "5432:5432" # Expose PostgreSQL on the host machine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: